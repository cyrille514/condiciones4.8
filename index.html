<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

 @layer base {
      button {
        @apply rounded-md bg-slate-200 border-1 border-slate-400  px-4 py-1 my-5 mx-5 text-sm cursor-pointer disabled:opacity-50
      }

    }
    
  </style>
    <title>Piedra, Papel o Tijera</title>
</head>
<body class="bg-scale-600 min-h-screen flex items-center justify-center p-4">

<div class="border bg-blue-200 py-16 px-14  rounded-lg max-w-md w-full text-center justify-center ">
    <h2>Jugar a piedra, papel o tijera:</h2>
    <p class="pox">👊 1. Piedra </p>
    <p class="pox">✋ 2. Papel </p>
    <p class="pox">✌ 3. Tijera</p>
    <label>Tu elección (1-3):</label>
    <input class="border-2"  type="number" id="eleccionUsuario" min="1" max="3" placeholder="Ej: 1">
    <br><br>
    <button type="button" onclick="jugar()">¡Jugamos!</button>
    <p class="resultado" id="resultado"></p>
</div>
<script src="./js/app.js" ></script>

</body>
</html>
